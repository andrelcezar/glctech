name: Atualizar Stats Zabbix

on:
  schedule:
    - cron: '0 * * * *'   # toda hora
  workflow_dispatch:        # permite rodar manualmente

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # usa Node.js 24

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar stats do Zabbix
        env:
          ZABBIX_URL:  ${{ secrets.ZABBIX_URL }}
          ZABBIX_USER: ${{ secrets.ZABBIX_USER }}
          ZABBIX_PASS: ${{ secrets.ZABBIX_PASS }}
        run: python scripts/fetch_zabbix_stats.py

      - name: Commitar stats.json atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/stats.json
          git diff --cached --quiet || git commit -m "chore: atualiza stats Zabbix [skip ci]"
          git push
